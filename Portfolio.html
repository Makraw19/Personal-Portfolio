<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MSA Portfolio — Editorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    * { box-sizing: border-box; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="portfolio-editorial.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    // Small theme toggle sitting inside each artboard's top-right
    const ArtboardScroll = ({ children }) => (
      <div style={{ width: '100%', height: '100%', overflow: 'auto', background: '#fff' }}>
        {children}
      </div>
    );

    const ThemeWrap = ({ Component, initial = 'dark' }) => {
      const [theme, setTheme] = useState(initial);
      return (
        <div style={{ position: 'relative', width: '100%', height: '100%' }}>
          <button
            onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
            style={{
              position: 'absolute', top: 14, right: 14, zIndex: 50,
              padding: '7px 12px', borderRadius: 999,
              background: 'rgba(0,0,0,0.7)', color: '#fff', border: 'none',
              fontSize: 11, fontFamily: 'ui-monospace, monospace',
              cursor: 'pointer', letterSpacing: '0.06em',
            }}
          >
            {theme === 'dark' ? '☾ DARK' : '☀ LIGHT'} · toggle
          </button>
          <ArtboardScroll>
            <Component theme={theme} />
          </ArtboardScroll>
        </div>
      );
    };

    const App = () => (
      <DesignCanvas>
        <DCSection id="main" title="Portfolio — Editorial direction" subtitle="Dark + light variants · purple accent · Instrument Serif / Inter Tight / JetBrains Mono">
          <DCArtboard id="editorial-dark" label="Editorial — Dark" width={1440} height={2200}>
            <ThemeWrap Component={EditorialPortfolio} initial="dark" />
          </DCArtboard>
          <DCArtboard id="editorial-light" label="Editorial — Light" width={1440} height={2200}>
            <ThemeWrap Component={EditorialPortfolio} initial="light" />
          </DCArtboard>
        </DCSection>

        <DCSection id="case" title="Sample case study page" subtitle="Linked from both variations via the first case card — open case-study.html">
          <DCArtboard id="cs-link" label="Open case-study.html →" width={720} height={420}>
            <div style={{
              width: '100%', height: '100%', background: '#17121f', color: '#f4f0ea',
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              gap: 20, fontFamily: 'Inter, sans-serif', padding: 40, textAlign: 'center',
            }}>
              <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: '#a78bfa', letterSpacing: '0.08em' }}>
                03 — CASE STUDY
              </div>
              <h2 style={{ fontFamily: 'Instrument Serif, serif', fontSize: 44, fontWeight: 400, margin: 0, lineHeight: 1.1 }}>
                Scaling regression from<br />8 hours to 40 minutes.
              </h2>
              <a href="case-study.html" target="_blank" style={{
                marginTop: 8, padding: '12px 24px', borderRadius: 999,
                background: '#8b5cf6', color: '#fff', textDecoration: 'none',
                fontSize: 13, fontWeight: 500,
              }}>
                Open full case study ↗
              </a>
              <div style={{ fontSize: 12, color: 'rgba(244,240,234,0.5)', fontFamily: 'JetBrains Mono, monospace' }}>
                Tensis · 2025
              </div>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
